<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- soft glow decor (kept outside the central square) -->
  <circle cx="1080" cy="90" r="240" fill="#ffffff" opacity="0.07"/>
  <circle cx="120" cy="560" r="220" fill="#ffffff" opacity="0.06"/>

  <!-- ===== Tudo dentro do quadrado central (x 285..915) com margem =====
       Empilhado e centralizado em x=600 -->

  <!-- icon tile 250x250 centralizado -->
  <rect x="475" y="92" width="250" height="250" rx="54" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.55" stroke-width="3.5"/>
  <g transform="translate(475,92) scale(3.906)" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 19c-4-3-9-4-14-4-1 0-2 .8-2 2v25c0 1.2 1 2 2.2 1.9 4.6-.4 9.6.6 13.8 3.6"/>
    <path d="M32 19c4-3 9-4 14-4 1 0 2 .8 2 2v25c0 1.2-1 2-2.2 1.9-4.6-.4-9.6.6-13.8 3.6"/>
    <path d="M32 19v28.5"/>
  </g>

  <!-- nome embaixo, centralizado -->
  <text x="600" y="490" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="96" font-weight="800" fill="#ffffff" letter-spacing="-1.5">EstudoFlow</text>
</svg>
